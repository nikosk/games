<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Memory Game - For Toddlers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #98FB98 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', 'Chalkboard', cursive;
            padding: 20px;
            overflow-x: hidden;
        }
        
        h1 {
            color: #FF6B6B;
            font-size: 2.5rem;
            text-shadow: 3px 3px 0 #fff, -1px -1px 0 #fff;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* Level Selection */
        #levelSelect {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .level-btn {
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .level-btn:hover {
            transform: scale(1.1);
        }
        
        .level-btn span {
            font-size: 2rem;
        }
        
        .level-easy {
            background: linear-gradient(135deg, #98FB98, #90EE90);
            box-shadow: 0 6px 0 #228B22;
        }
        
        .level-easy:active {
            box-shadow: 0 2px 0 #228B22;
            transform: translateY(4px);
        }
        
        .level-medium {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            box-shadow: 0 6px 0 #D2691E;
        }
        
        .level-medium:active {
            box-shadow: 0 2px 0 #D2691E;
            transform: translateY(4px);
        }
        
        .level-hard {
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            box-shadow: 0 6px 0 #C0392B;
        }
        
        .level-hard:active {
            box-shadow: 0 2px 0 #C0392B;
            transform: translateY(4px);
        }
        
        /* Game Container */
        #gameContainer {
            display: none;
            flex-direction: column;
            align-items: center;
        }
        
        #gameInfo {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 1.5rem;
            color: #333;
            background: rgba(255,255,255,0.8);
            padding: 10px 30px;
            border-radius: 30px;
        }
        
        #gameInfo span {
            font-weight: bold;
            color: #FF6B6B;
        }
        
        /* Card Grid */
        #cardGrid {
            display: grid;
            gap: 15px;
            justify-content: center;
        }
        
        .card {
            width: 100px;
            height: 100px;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card.matched {
            animation: matchPulse 0.5s ease;
        }
        
        @keyframes matchPulse {
            0%, 100% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .card-front {
            background: linear-gradient(135deg, #FF6B9D, #FF8E53);
            background-image: 
                radial-gradient(circle at 20% 80%, rgba(255,255,255,0.3) 10%, transparent 10%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.3) 10%, transparent 10%);
        }
        
        .card-back {
            background: white;
            transform: rotateY(180deg);
            border: 4px solid #FFD700;
        }
        
        /* Animal Emojis */
        .animal {
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }
        
        /* Back Button */
        #backBtn {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 1.3rem;
            font-family: inherit;
            font-weight: bold;
            background: #87CEEB;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 0 #5DADE2;
            transition: transform 0.1s;
        }
        
        #backBtn:active {
            box-shadow: 0 2px 0 #5DADE2;
            transform: translateY(2px);
        }
        
        /* Win Screen */
        #winScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        
        #winScreen.show {
            display: flex;
        }
        
        .win-content {
            background: white;
            padding: 40px 60px;
            border-radius: 30px;
            text-align: center;
            animation: popIn 0.5s ease;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        
        .win-content h2 {
            font-size: 3rem;
            color: #FFD700;
            text-shadow: 2px 2px 0 #FF6B6B;
            margin-bottom: 20px;
        }
        
        .win-content .trophy {
            font-size: 5rem;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .win-content p {
            font-size: 1.5rem;
            color: #666;
            margin: 20px 0;
        }
        
        .win-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        
        .win-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .win-btn:hover {
            transform: scale(1.1);
        }
        
        .win-btn.play-again {
            background: #98FB98;
            box-shadow: 0 4px 0 #228B22;
        }
        
        .win-btn.home {
            background: #87CEEB;
            box-shadow: 0 4px 0 #5DADE2;
        }
        
        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: fall linear forwards;
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
            }
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .card { width: 70px; height: 70px; }
            .card-face { font-size: 2rem; }
            .level-btn { width: 90px; height: 90px; }
            #cardGrid { gap: 10px; }
        }
    </style>
</head>
<body>
    <h1>🦁 Animal Memory Game 🐻</h1>
    <p class="subtitle">Match the cute animals!</p>
    
    <div id="levelSelect">
        <button class="level-btn level-easy" onclick="startGame('easy')">
            <span>🌟</span>
            Easy<br>(4 pairs)
        </button>
        <button class="level-btn level-medium" onclick="startGame('medium')">
            <span>🌟🌟</span>
            Medium<br>(6 pairs)
        </button>
        <button class="level-btn level-hard" onclick="startGame('hard')">
            <span>🌟🌟🌟</span>
            Hard<br>(8 pairs)
        </button>
    </div>
    
    <div id="gameContainer">
        <div id="gameInfo">
            <div>Moves: <span id="moves">0</span></div>
            <div>Pairs: <span id="pairs">0</span>/<span id="totalPairs">0</span></div>
        </div>
        <div id="cardGrid"></div>
        <button id="backBtn" onclick="showLevelSelect()">← Back to Levels</button>
    </div>
    
    <div id="winScreen">
        <div class="win-content">
            <div class="trophy">🏆</div>
            <h2>YOU DID IT!</h2>
            <p>You found all the pairs!</p>
            <p>Moves: <strong id="finalMoves">0</strong></p>
            <div class="win-buttons">
                <button class="win-btn play-again" onclick="playAgain()">Play Again 🔄</button>
                <button class="win-btn home" onclick="goHome()">Home 🏠</button>
            </div>
        </div>
    </div>

    <script>
        // Animal emojis - cute and toddler-friendly
        const animals = ['🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼', '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔'];
        
        let currentLevel = '';
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;
        
        // Level configurations
        const levelConfig = {
            easy: { pairs: 4, cols: 4 },
            medium: { pairs: 6, cols: 4 },
            hard: { pairs: 8, cols: 4 }
        };
        
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function startGame(level) {
            currentLevel = level;
            const config = levelConfig[level];
            
            // Select animals for this game
            const selectedAnimals = shuffle(animals).slice(0, config.pairs);
            
            // Create pairs
            cards = shuffle([...selectedAnimals, ...selectedAnimals]);
            
            // Reset game state
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;
            
            // Update UI
            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';
            document.getElementById('totalPairs').textContent = config.pairs;
            
            // Show game container
            document.getElementById('levelSelect').style.display = 'none';
            document.getElementById('gameContainer').style.display = 'flex';
            
            // Create card grid
            createCardGrid(config);
        }
        
        function createCardGrid(config) {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            grid.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
            
            cards.forEach((animal, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.animal = animal;
                
                card.innerHTML = `
                    <div class="card-face card-front">❓</div>
                    <div class="card-face card-back"><span class="animal">${animal}</span></div>
                `;
                
                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }
        
        function flipCard(card) {
            // Prevent flipping if can't flip, already flipped, or matched
            if (!canFlip || 
                card.classList.contains('flipped') || 
                card.classList.contains('matched')) {
                return;
            }
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }
        
        function checkMatch() {
            canFlip = false;
            
            const [card1, card2] = flippedCards;
            const match = card1.dataset.animal === card2.dataset.animal;
            
            if (match) {
                // Match found!
                setTimeout(() => {
                    card1.classList.add('matched');
                    card2.classList.add('matched');
                    matchedPairs++;
                    document.getElementById('pairs').textContent = matchedPairs;
                    
                    // Happy bounce animation
                    card1.style.animation = 'matchPulse 0.5s ease';
                    card2.style.animation = 'matchPulse 0.5s ease';
                    
                    flippedCards = [];
                    canFlip = true;
                    
                    // Check win
                    if (matchedPairs === levelConfig[currentLevel].pairs) {
                        setTimeout(showWin, 500);
                    }
                }, 300);
            } else {
                // No match - flip back
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }
        
        function showWin() {
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('winScreen').classList.add('show');
            createConfetti();
        }
        
        function createConfetti() {
            const colors = ['#FF6B6B', '#FFD700', '#98FB98', '#87CEEB', '#FF8E53', '#DDA0DD'];
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 50);
            }
        }
        
        function playAgain() {
            document.getElementById('winScreen').classList.remove('show');
            startGame(currentLevel);
        }
        
        function goHome() {
            document.getElementById('winScreen').classList.remove('show');
            showLevelSelect();
        }
        
        function showLevelSelect() {
            document.getElementById('gameContainer').style.display = 'none';
            document.getElementById('levelSelect').style.display = 'flex';
        }
        
        // Initialize
        showLevelSelect();
    </script>
</body>
</html>
