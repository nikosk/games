<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#173f38" />
    <title>Railway Workshop</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Trebuchet MS", "Avenir Next", sans-serif;
        background: #173f38;
      }

      * { box-sizing: border-box; }

      html,
      body,
      #game {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 20%, rgba(245, 210, 116, 0.12), transparent 35%),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 7px),
          #173f38;
        touch-action: none;
      }

      #game {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        outline: none;
        box-shadow: 0 18px 70px rgba(7, 24, 21, 0.45);
      }

      canvas:focus-visible {
        outline: 4px solid #f5d274;
        outline-offset: -4px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <main id="game" aria-label="Railway Workshop game"></main>
    <p class="sr-only">
      Choose straight or curved track, place pieces on the board, tap placed track to rotate it,
      then run the train. Keyboard shortcuts: 1 and 2 choose track, E chooses the eraser,
      Control Z undoes, and Space runs the train.
    </p>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
