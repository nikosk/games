// ─────────────────────────────────────
//  HIPPO'S GREAT FEAST
//  A platform adventure across 10 lands
// ─────────────────────────────────────
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 900, H = 500;

// ── Audio ────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function sfx(freq,type,dur,vol=0.15,ramp=0){
  if(AC.state==='suspended')AC.resume();
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime);
  if(ramp)o.frequency.exponentialRampToValueAtTime(ramp,AC.currentTime+dur);
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.start();o.stop(AC.currentTime+dur);
}
function sfxChime(n){ for(let i=0;i<3;i++)setTimeout(()=>sfx(400+i*200,'triangle',0.15,0.12,800),i*80); }
function sfxJump(){ sfx(180,'sine',0.12,0.06,400); }
function sfxCoin(){ sfx(800,'square',0.08,0.08,1200); }
function sfxHurt(){ sfx(90,'sawtooth',0.25,0.2,40); }
function sfxVictory(){ sfx(523,'triangle',0.3,0.2);setTimeout(()=>sfx(659,'triangle',0.3,0.2),150);setTimeout(()=>sfx(784,'triangle',0.4,0.3),300); }
function sfxPowerup(){ sfx(600,'triangle',0.15,0.15,1200);setTimeout(()=>sfx(900,'triangle',0.2,0.2,1600),100); }
function sfxStomp(){ sfx(60,'sawtooth',0.15,0.1,30); }

// ── Ambient Music ────────────────────
let ambientNodes=[];
function stopAmbient(){
  ambientNodes.forEach(n=>{try{n.osc.stop();}catch(e){}});
  ambientNodes=[];
}
function startAmbient(theme){
  stopAmbient();
  if(!musicEnabled)return;
  if(AC.state==='suspended')AC.resume();
  const baseFreq=theme===THEMES.lava?55:theme===THEMES.ice?130:theme===THEMES.final?98:110;
  const osc=AC.createOscillator();
  const gain=AC.createGain();
  const filt=AC.createBiquadFilter();
  osc.type='triangle';
  osc.frequency.setValueAtTime(baseFreq,AC.currentTime);
  filt.type='lowpass';filt.frequency.setValueAtTime(300,AC.currentTime);
  gain.gain.setValueAtTime(0.04,AC.currentTime);
  osc.connect(filt);filt.connect(gain);gain.connect(AC.destination);
  osc.start();
  ambientNodes.push({osc,gain,filt});
  const osc2=AC.createOscillator();
  const gain2=AC.createGain();
  osc2.type='sine';
  osc2.frequency.setValueAtTime(baseFreq*1.5,AC.currentTime);
  gain2.gain.setValueAtTime(0.02,AC.currentTime);
  osc2.connect(gain2);gain2.connect(AC.destination);
  osc2.start();
  ambientNodes.push({osc:osc2,gain:gain2});
}
function toggleMusic(){
  musicEnabled=!musicEnabled;
  if(!musicEnabled)stopAmbient();
  else if(state==='playing')startAmbient(levels[curLevel].theme);
}

// ── Input ────────────────────────────
const keys={};
let touchLeft=false,touchRight=false,touchJump=false;
window.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;e.preventDefault();});
let mouseX=0,mouseY=0,mouseDown=false,justClicked=false;
canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top;});
canvas.addEventListener('mousedown',()=>{mouseDown=true;justClicked=true;});
canvas.addEventListener('mouseup',()=>{mouseDown=false;});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;mouseY=e.touches[0].clientY-r.top;mouseDown=true;justClicked=true;handleTouchControls(mouseX,mouseY,true);});
canvas.addEventListener('touchend',e=>{e.preventDefault();mouseDown=false;touchLeft=false;touchRight=false;touchJump=false;});
canvas.addEventListener('touchmove',e=>{e.preventDefault();const r=canvas.getBoundingClientRect();mouseX=e.touches[0].clientX-r.left;mouseY=e.touches[0].clientY-r.top;handleTouchControls(mouseX,mouseY,true);});
canvas.addEventListener('touchcancel',()=>{mouseDown=false;touchLeft=false;touchRight=false;touchJump=false;});

function handleTouchControls(mx,my,down){
  if(!down)return;
  // Left button area (bottom-left)
  touchLeft=(mx>=10&&mx<=70&&my>=H-80&&my<=H-20);
  // Right button area
  touchRight=(mx>=80&&mx<=140&&my>=H-80&&my<=H-20);
  // Jump button area (bottom-right)
  touchJump=(mx>=W-70&&mx<=W-10&&my>=H-80&&my<=H-20);
}

// ── Particles ────────────────────────
let particles=[],floatTexts=[],screenShake=0;
function spawnP(x,y,count,colors,power=4){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*power*2,vy:(Math.random()-0.5)*power*2-Math.random()*power,
      r:Math.random()*4+2,c:colors[Math.floor(Math.random()*colors.length)],a:1,d:0.02+Math.random()*0.03});
  }
}
function spawnFT(x,y,txt,color='#fff',size=18,bold=false){
  floatTexts.push({x,y,text:txt,color,size,bold,vy:-1.5,a:1});
}

// ── Button helper ────────────────────
function button(bx,by,bw,bh,label,hoverColor='#5dade2'){
  const h=mouseX>=bx&&mouseX<=bx+bw&&mouseY>=by&&mouseY<=by+bh;
  ctx.save();
  ctx.fillStyle=h?hoverColor:'#3498db';
  ctx.strokeStyle='#fff';ctx.lineWidth=2;
  roundRect(bx,by,bw,bh,8);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 16px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText(label,bx+bw/2,by+bh/2+6);
  ctx.restore();
  return h&&justClicked;
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ── Camera ───────────────────────────
let camX=0,camY=0;
function updateCam(tx,ty,ww,wh){
  const targX=tx-W/2,targY=ty-H/2;
  camX+=(targX-camX)*0.1;camY+=(targY-camY)*0.1;
  camX=Math.max(0,Math.min(ww-W,camX));
  camY=Math.max(0,Math.min(wh-H,camY));
}

// ── Player (Hippo) ──────────────────
const hippo={
  x:80,y:300,w:38,h:36,vx:0,vy:0,spd:4.5,jmp:11,grav:0.55,onGround:false,
  face:1,invincible:0,doubleJump:false,djUsed:false,stunTimer:0,
  trail:[]
};
function resetHippo(spawn){ hippo.x=spawn.x;hippo.y=spawn.y;hippo.w=38;hippo.h=36;hippo.vx=0;hippo.vy=0;hippo.onGround=false;hippo.face=1;hippo.invincible=60;hippo.doubleJump=false;hippo.djUsed=false;hippo.stunTimer=0;hippo.trail=[]; }

function drawHippo(){
  ctx.save();
  const cx=hippo.x+hippo.w/2,cy=hippo.y+hippo.h/2;
  ctx.translate(cx,cy);
  if(hippo.face<0)ctx.scale(-1,1);
  if(hippo.invincible>0&&Math.floor(hippo.invincible/4)%2===0){ctx.restore();return;}

  const onGround=hippo.onGround;
  const moving=Math.abs(hippo.vx)>0.5;
  const runCycle=onGround&&moving?Math.sin(hippoFrame*0.3)*5:0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(0,hippo.h/2-2,hippo.w/2+2,5,0,0,Math.PI*2);ctx.fill();

  // Body
  const bodyGrad=ctx.createLinearGradient(0,-hippo.h/2,0,hippo.h/2);
  bodyGrad.addColorStop(0,'#b8b8d4');bodyGrad.addColorStop(0.5,'#8e8eb8');bodyGrad.addColorStop(1,'#6a6a9a');
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();ctx.ellipse(0,2,hippo.w/2-2,hippo.h/2-4,0,0,Math.PI*2);ctx.fill();

  // Head/snout
  ctx.fillStyle='#c8c8e0';
  ctx.beginPath();ctx.ellipse(hippo.w/4,-4,hippo.w/3,hippo.h/3,0,0,Math.PI*2);ctx.fill();
  // Snout nose
  ctx.fillStyle='#a0a0c0';
  ctx.beginPath();ctx.ellipse(hippo.w/4+6,0,10,8,0,0,Math.PI*2);ctx.fill();
  // Nostrils
  ctx.fillStyle='#5a5a7a';ctx.beginPath();ctx.arc(hippo.w/4+10,-2,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(hippo.w/4+3,-2,2.5,0,Math.PI*2);ctx.fill();

  // Eyes
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(6,-12,6,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(8,-12,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(9,-13,1,0,Math.PI*2);ctx.fill();

  // Ears
  ctx.fillStyle='#8e8eb8';ctx.beginPath();ctx.ellipse(-hippo.w/4+4,-hippo.h/2+2,6,4,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c8c8e0';ctx.beginPath();ctx.ellipse(-hippo.w/4+4,-hippo.h/2,4,3,-0.3,0,Math.PI*2);ctx.fill();

  // Animated feet (run cycle)
  ctx.fillStyle='#7a7aaa';
  if(onGround&&moving){
    ctx.save();ctx.translate(0,runCycle);
    ctx.fillRect(-hippo.w/2+5,hippo.h/2-7,12,7);
    ctx.fillStyle='#9999bb';ctx.beginPath();ctx.arc(-hippo.w/2+10,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-hippo.w/2+15,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.save();ctx.translate(0,-runCycle);
    ctx.fillRect(hippo.w/2-16,hippo.h/2-7,12,7);
    ctx.fillStyle='#9999bb';ctx.beginPath();ctx.arc(hippo.w/2-11,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hippo.w/2-6,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }else{
    ctx.fillRect(-hippo.w/2+5,hippo.h/2-7,12,7);
    ctx.fillRect(hippo.w/2-16,hippo.h/2-7,12,7);
    ctx.fillStyle='#9999bb';ctx.beginPath();ctx.arc(-hippo.w/2+10,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(-hippo.w/2+15,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hippo.w/2-11,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(hippo.w/2-6,hippo.h/2,2.5,0,Math.PI*2);ctx.fill();
  }

  // Tail wag
  ctx.fillStyle='#b8b8d4';
  const tailWag=moving?Math.sin(hippoFrame*0.4)*4:0;
  ctx.beginPath();ctx.moveTo(-hippo.w/2+2,2);ctx.quadraticCurveTo(-hippo.w/2-6-tailWag,-2,-hippo.w/2-4,-8+tailWag);ctx.quadraticCurveTo(-hippo.w/2-2,-4,-hippo.w/2+2,2);ctx.fill();

  // Power-up aura
  if(hippo.doubleJump){
    ctx.strokeStyle='rgba(255,215,0,0.5)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(0,2,hippo.w/2+3,hippo.h/2+1,0,0,Math.PI*2);ctx.stroke();
  }

  ctx.restore();
}

let state='title', prevState='title'; // title, story, playing, win, gameover, levelSelect, gameComplete

let deathMessage='';

let screenFlash=0;

// ── Level-specific mutable state ─────
let platData=[], enemyData=[], foodData=[], spikeData=[], flagData={};
let movingPlats=[];

function initLevel(idx){
  const L=levels[idx];
  platData=L.platforms.map(p=>({...p,origX:p.x,origY:p.y,phase:Math.random()*Math.PI*2}));
  enemyData=L.enemies.map(e=>({...e,origStartX:e.startX,origEndX:e.endX,hp:e.hp||1,hitTimer:0,w:e.w||40,h:e.h||40,y:e.y||L.platforms[0].y-(e.h||40)}));
  foodData=L.food.map(f=>({...f,collected:false}));
  spikeData=L.spikes.map(s=>({...s}));
  flagData={...L.flag};
  movingPlats=platData.filter(p=>p.moving);
  resetHippo(L.spawn);
  hippo.invincible=60;
  score=0;
  screenShake=0;particles=[];floatTexts=[];
  camX=0;camY=0;
  bossDefeated=false;
  starCollectCount=0;
  totalFoodInLevel=foodData.length;
  foodData.forEach(f=>{if(f.e==='⭐')starCollectCount++;});
}

// ── Title Screen ─────────────────────
function drawTitle(){
  const t=animTimer;
  // Background parallax
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a4a');grad.addColorStop(0.5,'#2a2a5a');grad.addColorStop(1,'#0a0a2a');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='#fff';
  for(let i=0;i<80;i++){
    const sx=(i*137+50)%W,sy=(i*89+30)%H*0.6;
    const br=0.4+0.6*Math.sin(t*0.02+i)*0.5;
    ctx.globalAlpha=0.3+br*0.7;
    ctx.beginPath();ctx.arc(sx,sy,1+br*1.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Decorative hills
  ctx.fillStyle='#1a3a1a';
  ctx.beginPath();ctx.moveTo(0,H);for(let x=0;x<=W;x+=20)ctx.lineTo(x,H-60-Math.sin(x*0.005+t*0.01)*30-Math.sin(x*0.013)*20);
  ctx.lineTo(W,H);ctx.fill();

  // Hippo sitting
  const hx=W/2,hy=H-140;
  ctx.save();ctx.translate(hx,hy+Math.sin(t*0.03)*4);
  // Body
  const bg=ctx.createLinearGradient(0,-40,0,30);
  bg.addColorStop(0,'#c8c8e0');bg.addColorStop(1,'#7a7aaa');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.ellipse(0,0,45,35,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#d8d8f0';
  ctx.beginPath();ctx.ellipse(30,-15,30,24,0,0,Math.PI*2);ctx.fill();
  // Snout
  ctx.fillStyle='#b0b0d0';
  ctx.beginPath();ctx.ellipse(46,-8,16,12,0,0,Math.PI*2);ctx.fill();
  // Nostrils
  ctx.fillStyle='#6a6a8a';ctx.beginPath();ctx.arc(50,-10,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(42,-10,3,0,Math.PI*2);ctx.fill();
  // Eyes (happy)
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(24,-22,8,9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(27,-22,4,0,Math.PI*2);ctx.fill();
  // Ears
  ctx.fillStyle='#8e8eb8';ctx.beginPath();ctx.ellipse(-20,-30,10,6,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#c8c8e0';ctx.beginPath();ctx.ellipse(-20,-30,6,4,-0.3,0,Math.PI*2);ctx.fill();
  // Feet
  ctx.fillStyle='#8a8aaa';ctx.fillRect(-30,28,16,10);ctx.fillRect(10,28,16,10);
  ctx.restore();

  // Title text with glow
  ctx.save();
  ctx.shadowColor='#f1c40f';ctx.shadowBlur=20+Math.sin(t*0.04)*8;
  ctx.fillStyle='#f9e654';ctx.font='bold 52px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText("HIPPO'S GREAT FEAST",W/2,115);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font='18px "Segoe UI"';
  ctx.fillText('A Platform Adventure',W/2,150);
  ctx.restore();

  // Buttons
  if(button(W/2-90,200,180,45,'▶  PLAY','#27ae60')){
    if(levelCompleted.length===0){
      curLevel=0;state='story';
    }else{
      state='levelSelect';
    }
    sfxChime();
  }
  if(button(W/2-90,260,180,45,'🎯  LEVELS','#8e44ad')){
    state='levelSelect';sfxChime();
  }
  if(button(W/2-90,320,180,45,'ℹ  HOW TO PLAY','#e67e22')){
    state='howTo';sfxChime();
  }
  // Music toggle
  const musicBtnY=380;
  ctx.save();
  const h3=mouseX>=W/2-30&&mouseX<=W/2+30&&mouseY>=musicBtnY&&mouseY<=musicBtnY+30;
  ctx.fillStyle=h3?'#555':'#333';
  ctx.strokeStyle='#888';ctx.lineWidth=1;
  roundRect(W/2-30,musicBtnY,60,30,15);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.textAlign='center';
  ctx.fillText(musicEnabled?'🔊':'🔇',W/2,musicBtnY+22);
  if(h3&&justClicked){toggleMusic();}
  ctx.restore();

  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='12px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText('Arrow Keys / WASD to move & jump  |  Press ↑/W twice for double-jump (with star power)',W/2,H-20);
  ctx.fillText('© 2026 Hippo Games — A delicious platform adventure',W/2,H-6);
}

// ── How To Play ──────────────────────
function drawHowTo(){
  ctx.fillStyle='#1a1a3a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f9e654';ctx.font='bold 36px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText('HOW TO PLAY',W/2,60);

  const lines=[
    ['🎮','Arrow Keys / WASD','Move left & right'],
    ['⬆️','Up / W / Space','Jump'],
    ['⬆️⬆️','Double-tap Jump','Double jump (needs ⭐ power-up)'],
    ['🍎','Healthy Foods','+30-50 points, sparkle effects!'],
    ['🍔','Junk Foods','+10-20 points, small bonus'],
    ['⭐','Star Power-Up','Grants double-jump ability'],
    ['👾','Enemies','They push you back — jump over them!'],
    ['⚠️','Spikes','Instant death — avoid at all costs!'],
    ['🏁','Flag','Reach it to complete the level'],
    ['💪','Boss (Level 10)','Jump on its head 5 times to defeat!'],
  ];
  lines.forEach((l,i)=>{
    const y=110+i*36;
    ctx.fillStyle='#fff';ctx.font='22px "Segoe UI"';ctx.textAlign='center';
    ctx.fillText(l[0],W/2-200,y+4);
    ctx.fillStyle='#3498db';ctx.font='bold 16px "Segoe UI"';ctx.textAlign='left';
    ctx.fillText(l[1],W/2-130,y+2);
    ctx.fillStyle='#aaa';ctx.font='14px "Segoe UI"';
    ctx.fillText(l[2],W/2-130,y+22);
  });

  if(button(W/2-70,H-70,140,40,'← BACK','#7f8c8d')){
    state='title';sfxChime();
  }
}

// ── Level Select ─────────────────────
function drawLevelSelect(){
  ctx.fillStyle='#1a1a3a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f9e654';ctx.font='bold 32px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText('SELECT LEVEL',W/2,50);

  const cols=5,rows=2;
  const startX=70,startY=100;
  const bw=140,bh=80,gap=16;

  for(let i=0;i<levels.length;i++){
    const col=i%cols,row=Math.floor(i/cols);
    const bx=startX+col*(bw+gap),by=startY+row*(bh+gap+30);
    const unlocked=i===0||levelCompleted[i-1];
    const completed=levelCompleted[i];

    if(unlocked){
      const h=mouseX>=bx&&mouseX<=bx+bw&&mouseY>=by&&mouseY<=by+bh;
      ctx.fillStyle=completed?'#27ae60':h?'#3498db':'#2c3e50';
      ctx.strokeStyle=completed?'#2ecc71':'#5dade2';ctx.lineWidth=2;
      roundRect(bx,by,bw,bh,10);ctx.fill();ctx.stroke();

      ctx.fillStyle='#fff';ctx.font='bold 13px "Segoe UI"';ctx.textAlign='center';
      ctx.fillText(`Level ${i+1}`,bx+bw/2,by+22);
      ctx.font='11px "Segoe UI"';
      ctx.fillText(completed?'✅ '+levels[i].name.split('The ')[1]||levels[i].name:levels[i].name.split('The ')[1]||levels[i].name,bx+bw/2,by+48);
      if(completed)ctx.fillText('⭐ CLEAR',bx+bw/2,by+66);

      if(h&&justClicked){curLevel=i;state='story';sfxChime();}
    }else{
      ctx.fillStyle='#1a1a2e';ctx.strokeStyle='#333';ctx.lineWidth=1;
      roundRect(bx,by,bw,bh,10);ctx.fill();ctx.stroke();
      ctx.fillStyle='#555';ctx.font='bold 36px "Segoe UI"';ctx.textAlign='center';
      ctx.fillText('🔒',bx+bw/2,by+50);
    }
  }

  // Score display
  ctx.fillStyle='#fff';ctx.font='bold 16px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText(`Total Score: ${totalScore}`,W/2,H-60);

  if(button(W/2-70,H-40,140,40,'← MENU','#7f8c8d')){
    state='title';sfxChime();
  }
}

// ── Story Screen ─────────────────────
function drawStory(){
  const L=levels[curLevel];
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  // Decorative background
  const grad=ctx.createRadialGradient(W/2,H/2,100,W/2,H/2,500);
  grad.addColorStop(0,'#1a1a4a');grad.addColorStop(1,'#000');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#f9e654';ctx.font='bold 32px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText(`Level ${curLevel+1}`,W/2,80);
  ctx.fillStyle='#fff';ctx.font='bold 22px "Segoe UI"';
  ctx.fillText(L.name,W/2,115);

  // Story text
  ctx.fillStyle='#ccc';ctx.font='17px "Segoe UI"';
  const lines=L.story.split('\n');
  lines.forEach((l,i)=>{ctx.fillText(l,W/2,170+i*30);});

  if(button(W/2-80,H-100,160,45,'▶  START LEVEL','#27ae60')){
    initLevel(curLevel);
    state='playing';
    startAmbient(levels[curLevel].theme);
    sfxChime();
  }
  if(button(W/2-80,H-45,160,40,'← BACK','#7f8c8d')){
    state=curLevel===0?'title':'levelSelect';
    sfxChime();if(curLevel===0)stopAmbient();
  }
}

// ── Draw backgrounds ─────────────────
function drawSky(theme){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,theme.skyTop);grad.addColorStop(1,theme.skyBot);
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Parallax clouds
  ctx.fillStyle='rgba(255,255,255,0.3)';
  for(let i=0;i<6;i++){
    const cx=((i*300+200)-camX*0.3)%(W+600)-200;
    const cy=60+i*45+Math.sin(animTimer*0.01+i)*10;
    ctx.beginPath();ctx.ellipse(cx,cy,50+i*10,20,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+30,cy-10,35+i*8,16,0,0,Math.PI*2);ctx.fill();
  }
}

function drawBackgroundHills(theme){
  // Distant hills
  ctx.fillStyle=theme.deco;ctx.globalAlpha=0.4;
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=30)ctx.lineTo(x,H-40-Math.sin((x-camX*0.2)*0.004)*25-Math.sin(x*0.008)*15);
  ctx.lineTo(W,H);ctx.fill();
  ctx.globalAlpha=1;
}

// ── Level Decorations ────────────────
function drawDecorations(theme){
  const seed=curLevel*137;

  // Theme-specific decorations
  if(theme===THEMES.meadow){
    // Trees
    for(let i=0;i<15;i++){
      const dx=((i*223+seed)%1800)-camX*0.4;
      if(dx<-80||dx>W+80)continue;
      const dy=H-88;
      ctx.fillStyle='#5a3a1a';ctx.fillRect(dx-3,dy-30,6,30);
      ctx.fillStyle='#2d8a2d';ctx.beginPath();ctx.arc(dx,dy-35,18+Math.sin(i)*8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3daa3d';ctx.beginPath();ctx.arc(dx+3,dy-38,12,0,Math.PI*2);ctx.fill();
    }
    // Flowers
    for(let i=0;i<25;i++){
      const dx=((i*157+seed*2)%2200)-camX*0.6;
      if(dx<-20||dx>W+20)continue;
      const dy=H-82+Math.sin(i*3.1)*5;
      ctx.fillStyle=['#e74c3c','#f1c40f','#e91e63','#ff9800'][i%4];
      ctx.beginPath();ctx.arc(dx,dy,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(dx,dy,1.5,0,Math.PI*2);ctx.fill();
    }
  }else if(theme===THEMES.desert){
    // Cacti
    for(let i=0;i<12;i++){
      const dx=((i*197+seed)%2000)-camX*0.4;
      if(dx<-40||dx>W+40)continue;
      const cactH=25+Math.sin(i*2.5)*10;
      const cactY=H-100+Math.sin(i)*10-cactH;
      ctx.fillStyle='#2d6a2d';ctx.fillRect(dx-4,cactY,8,cactH);
      ctx.fillStyle='#3d8a3d';ctx.fillRect(dx-2,cactY+2,4,cactH-4);
    }
    // Rocks
    ctx.fillStyle='#8a7a6a';
    for(let i=0;i<10;i++){
      const dx=((i*271+seed*3)%2000)-camX*0.5;
      if(dx<-30||dx>W+30)continue;
      const dy=H-86;
      ctx.beginPath();ctx.ellipse(dx,dy,9+Math.sin(i)*4,6,0,0,Math.PI*2);ctx.fill();
    }
  }else if(theme===THEMES.forest){
    // Tall trees
    for(let i=0;i<14;i++){
      const dx=((i*251+seed)%2200)-camX*0.3;
      if(dx<-60||dx>W+60)continue;
      const dy=H-88;
      ctx.fillStyle='#3a2010';ctx.fillRect(dx-4,dy-50,8,50);
      ctx.fillStyle='#1a4a0a';
      ctx.beginPath();ctx.moveTo(dx-20,dy-25);ctx.lineTo(dx+20,dy-25);ctx.lineTo(dx,dy-60);ctx.fill();
      ctx.beginPath();ctx.moveTo(dx-16,dy-40);ctx.lineTo(dx+16,dy-40);ctx.lineTo(dx,dy-70);ctx.fill();
      ctx.fillStyle='#2a6a1a';
      ctx.beginPath();ctx.moveTo(dx-12,dy-55);ctx.lineTo(dx+12,dy-55);ctx.lineTo(dx,dy-80);ctx.fill();
    }
    // Fireflies
    for(let i=0;i<15;i++){
      const fx=((i*317+seed*5+animTimer*0.5)%2200)-camX*0.5;
      const fy=((i*197)%200)+30;
      ctx.fillStyle=`rgba(255,255,150,${0.4+Math.sin(animTimer*0.06+i)*0.3})`;
      ctx.beginPath();ctx.arc(fx,fy,2,0,Math.PI*2);ctx.fill();
    }
  }else if(theme===THEMES.ice){
    // Ice crystals
    for(let i=0;i<16;i++){
      const dx=((i*211+seed)%2100)-camX*0.4;
      if(dx<-30||dx>W+30)continue;
      const iceY=H-88+Math.sin(i)*5;
      ctx.fillStyle='rgba(200,230,255,0.5)';
      ctx.beginPath();ctx.moveTo(dx,iceY-8);ctx.lineTo(dx-6,iceY+5);ctx.lineTo(dx+6,iceY+5);ctx.closePath();ctx.fill();
    }
    // Snow mounds
    ctx.fillStyle='rgba(240,248,255,0.4)';
    for(let i=0;i<10;i++){
      const dx=((i*277+seed*2)%2000)-camX*0.5;
      if(dx<-50||dx>W+50)continue;
      ctx.beginPath();ctx.ellipse(dx,H-86,20+Math.sin(i)*10,8,0,0,Math.PI*2);ctx.fill();
    }
  }else if(theme===THEMES.lava){
    // Lava bubbles at bottom
    for(let i=0;i<20;i++){
      const dx=((i*167+animTimer*2)%2200)-camX*0.4;
      if(dx<-20||dx>W+20)continue;
      const dy=H-60+Math.sin(animTimer*0.03+i)*15;
      ctx.fillStyle=`rgba(255,${100+Math.sin(i)*40},0,0.6)`;
      ctx.beginPath();ctx.arc(dx,dy,3+Math.sin(i)*2,0,Math.PI*2);ctx.fill();
    }
    // Stalactites (top)
    ctx.fillStyle='#3a1a0a';
    for(let i=0;i<12;i++){
      const dx=((i*203+seed)%2200)-camX*0.3;
      if(dx<-20||dx>W+20)continue;
      ctx.beginPath();ctx.moveTo(dx-8,0);ctx.lineTo(dx+8,0);ctx.lineTo(dx,25+Math.sin(i)*10);ctx.fill();
    }
  }else if(theme===THEMES.cloud){
    // Background clouds
    ctx.fillStyle='rgba(255,255,255,0.15)';
    for(let i=0;i<12;i++){
      const dx=((i*233+animTimer*0.2)%2400)-camX*0.2;
      if(dx<-80||dx>W+80)continue;
      const dy=80+Math.sin(i*2)*30;
      ctx.beginPath();ctx.ellipse(dx,dy,50+Math.sin(i)*15,25,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(dx+25,dy-8,35,20,0,0,Math.PI*2);ctx.fill();
    }
  }else if(theme===THEMES.candy){
    // Candy canes & lollipops
    for(let i=0;i<14;i++){
      const dx=((i*191+seed)%2200)-camX*0.4;
      if(dx<-30||dx>W+30)continue;
      const dy=H-90;
      ctx.fillStyle='#e91e63';ctx.fillRect(dx-3,dy-20,6,20);
      ctx.fillStyle='#fff';ctx.fillRect(dx-3,dy-15,6,3);
      ctx.fillStyle='#ff69b4';ctx.beginPath();ctx.arc(dx,dy-22,8,0,Math.PI*2);ctx.fill();
    }
    // Sprinkles
    for(let i=0;i<30;i++){
      const dx=((i*137+seed*3)%2400)-camX*0.6;
      if(dx<-15||dx>W+15)continue;
      const dy=H-84+Math.sin(i*4.7)*4;
      ctx.fillStyle=['#ff0','#f0f','#0ff','#f00','#0f0'][i%5];
      ctx.fillRect(dx,dy,2,5);
    }
  }else if(theme===THEMES.final){
    // Mystical trees
    for(let i=0;i<10;i++){
      const dx=((i*257+seed)%2200)-camX*0.35;
      if(dx<-70||dx>W+70)continue;
      const dy=H-88;
      ctx.fillStyle='#3a1a5a';ctx.fillRect(dx-5,dy-45,10,45);
      ctx.fillStyle='#6a2a8a';ctx.beginPath();ctx.arc(dx,dy-50,22+Math.sin(i)*10,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,215,0,0.15)';
      ctx.beginPath();ctx.arc(dx,dy-50,28+Math.sin(animTimer*0.03+i)*4,0,Math.PI*2);ctx.fill();
    }
    // Floating particles
    for(let i=0;i<15;i++){
      const px=((i*337+animTimer*0.3)%2400)-camX*0.4;
      const py=((i*251+animTimer*0.2)%H);
      ctx.fillStyle=`rgba(255,215,0,${0.2+Math.sin(animTimer*0.04+i)*0.15})`;
      ctx.beginPath();ctx.arc(px,py,2,0,Math.PI*2);ctx.fill();
    }
  }else{
    // Generic bushes
    ctx.fillStyle=theme.deco;
    for(let i=0;i<20;i++){
      const dx=((i*173+seed)%1200)-camX*0.5;
      if(dx<-60||dx>W+60)continue;
      const dy=H-80-Math.abs(Math.sin(i*2.7))*30;
      ctx.beginPath();ctx.arc(dx,dy,10+Math.sin(i)*5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=theme.groundTop;
      ctx.beginPath();ctx.arc(dx+5,dy-2,6+Math.sin(i)*3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=theme.deco;
    }
  }
}

// ── Draw platforms ───────────────────
function drawPlatforms(theme){
  for(let p of platData){
    const px=p.x-camX,py=p.y-camY;
    if(px+p.w<-50||px>W+50)continue;

    ctx.fillStyle=theme.ground;
    ctx.fillRect(px,py,p.w,p.h);
    ctx.fillStyle=theme.groundTop;
    ctx.fillRect(px,py,p.w,6);

    // Edge detail
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(px,py+6,p.w,2);
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(px,py,p.w,1);

    if(p.bouncy){
      ctx.fillStyle='rgba(255,255,200,0.4)';
      ctx.fillRect(px,py,p.w,3);
    }
  }
}

// ── Draw enemies ─────────────────────
function drawEnemies(){
  for(let e of enemyData){
    const ex=e.x-camX,ey=e.y-camY;
    if(ex<-60||ex>W+60)continue;

    ctx.save();
    if(e.hitTimer>0){
      ctx.globalAlpha=0.5+Math.sin(e.hitTimer*0.5)*0.5;
    }

    if(e.type==='moth'){
      // Winged moth
      const wingFlap=Math.sin(animTimer*0.15)*8;
      ctx.fillStyle='#8e44ad';
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2-5,20,12+wingFlap,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6c3483';
      ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,12,18,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+e.w/2-3,ey+e.h/2-6,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex+e.w/2-2,ey+e.h/2-6,1.5,0,Math.PI*2);ctx.fill();
    }else if(e.type==='yeti'){
      ctx.fillStyle='#d5e8f0';ctx.fillRect(ex,ey,e.w,e.h);
      ctx.fillStyle='#b0c8d8';ctx.fillRect(ex+4,ey+4,e.w-8,e.h-8);
      ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(ex+e.w/2,ey+8,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+e.w/2-5,ey+8,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex+e.w/2-4,ey+8,1.5,0,Math.PI*2);ctx.fill();
    }else if(e.type==='bat'){
      const flap=Math.sin(animTimer*0.2)*6;
      ctx.fillStyle='#5a1a1a';ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,12,10+flap,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#8b0000';ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h/2,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(ex+e.w/2-2,ey+e.h/2-3,2,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex+e.w/2-1,ey+e.h/2-3,1,0,Math.PI*2);ctx.fill();
    }else if(e.type==='cloudGuard'){
      ctx.fillStyle='#e8f0ff';ctx.beginPath();ctx.ellipse(ex+e.w/2,ey+e.h/2,16,12,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h/2,10,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3498db';ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h/2,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+e.w/2-2,ey+e.h/2-2,2,0,Math.PI*2);ctx.fill();
    }else if(e.type==='sprite'){
      const bob=Math.sin(animTimer*0.1+e.x*0.01)*4;
      ctx.fillStyle='#f8a0c0';ctx.beginPath();ctx.arc(ex+e.w/2,ey+e.h/2+bob,14,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#f0c0d8';ctx.beginPath();ctx.arc(ex+e.w/2-3,ey+e.h/2-4+bob,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+e.w/2-2,ey+e.h/2-5+bob,2,0,Math.PI*2);ctx.fill();
    }else if(e.type==='boss'){
      // Grove Guardian Boss
      const bob=Math.sin(animTimer*0.05)*3;
      const bx=ex,by=ey+bob;
      // Body
      const bgrad=ctx.createLinearGradient(bx,by,bx,by+e.h);
      bgrad.addColorStop(0,'#2d5a1a');bgrad.addColorStop(1,'#1a3a0a');
      ctx.fillStyle=bgrad;
      ctx.beginPath();ctx.ellipse(bx+e.w/2,by+e.h/2,e.w/2,e.h/2,0,0,Math.PI*2);ctx.fill();
      // Spikes on top
      ctx.fillStyle='#4a8a2a';
      for(let s=0;s<5;s++){
        ctx.beginPath();ctx.moveTo(bx+e.w/2-25+s*12,by-8);ctx.lineTo(bx+e.w/2-20+s*12,by-20);ctx.lineTo(bx+e.w/2-15+s*12,by-8);ctx.fill();
      }
      // Evil eyes
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(bx+e.w/2-12,by+e.h/2-8,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff0';ctx.beginPath();ctx.arc(bx+e.w/2+12,by+e.h/2-8,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(bx+e.w/2-10,by+e.h/2-8,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(bx+e.w/2+14,by+e.h/2-8,3,0,Math.PI*2);ctx.fill();
      // Mouth
      ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.ellipse(bx+e.w/2,by+e.h/2+12,10,4,0,0,Math.PI*2);ctx.fill();
      // HP bar
      const hpW=40,hpH=6;
      ctx.fillStyle='#333';ctx.fillRect(bx+e.w/2-hpW/2,by-30,hpW,hpH);
      ctx.fillStyle='#2ecc71';ctx.fillRect(bx+e.w/2-hpW/2,by-30,hpW*(e.hp/5),hpH);
    }else{
      // Default enemy (crab-like)
      ctx.fillStyle='#e74c3c';ctx.fillRect(ex,ey,e.w,e.h);
      ctx.fillStyle='#c0392b';ctx.fillRect(ex+2,ey+2,e.w-4,e.h-4);
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex+e.w-8,ey+10,6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(ex+e.w-7,ey+10,2.5,0,Math.PI*2);ctx.fill();
    }

    ctx.restore();
  }
}

// ── Draw spikes ──────────────────────
function drawSpikes(){
  ctx.fillStyle='#e74c3c';
  for(let s of spikeData){
    const sx=s.x-camX,sy=s.y-camY;
    if(sx<-30||sx>W+30)continue;
    ctx.beginPath();ctx.moveTo(sx,sy+s.h);ctx.lineTo(sx+s.w/2,sy-8);ctx.lineTo(sx+s.w,sy+s.h);ctx.fill();
    ctx.fillStyle='#c0392b';
    ctx.beginPath();ctx.moveTo(sx+4,sy+s.h);ctx.lineTo(sx+s.w/2,sy-2);ctx.lineTo(sx+s.w-4,sy+s.h);ctx.fill();
    ctx.fillStyle='#e74c3c';
  }
}

// ── Draw flag ────────────────────────
function drawFlag(){
  const fx=flagData.x-camX,fy=flagData.y-camY;
  // Pole
  ctx.fillStyle='#7f8c8d';ctx.fillRect(fx,fy,5,flagData.h);
  // Flag cloth (waving)
  const wave=Math.sin(animTimer*0.06)*4;
  ctx.fillStyle='#e74c3c';
  ctx.beginPath();ctx.moveTo(fx+5,fy);ctx.lineTo(fx+35+wave,fy+15);ctx.lineTo(fx+5,fy+30);ctx.fill();
  // Star on flag
  ctx.fillStyle='#f1c40f';ctx.font='14px Arial';ctx.textAlign='center';
  ctx.fillText('⭐',fx+14+wave*0.5,fy+22);
  // Glow on final level
  if(curLevel===9){
    ctx.fillStyle='rgba(255,215,0,0.3)';
    ctx.beginPath();ctx.arc(fx+20,fy+15,25+Math.sin(animTimer*0.05)*5,0,Math.PI*2);ctx.fill();
  }
}

// ── Draw HUD ─────────────────────────
function drawHUD(){
  collectedFoodCount=foodData.filter(f=>f.collected).length;

  // Top bar background
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,W,44);
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(0,44,W,2);

  // Level name
  ctx.fillStyle='#fff';ctx.font='bold 14px "Segoe UI"';ctx.textAlign='left';
  ctx.fillText(`Lv${curLevel+1} ${levels[curLevel].name}`,12,30);

  // Collectibles
  ctx.fillStyle='#aaa';ctx.font='12px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText(`🍎 ${collectedFoodCount}/${totalFoodInLevel}`,W/2-40,30);

  // Score
  ctx.fillStyle='#f1c40f';ctx.font='bold 14px "Segoe UI"';ctx.textAlign='right';
  ctx.fillText(`⭐ ${score}`,W-12,30);

  // Power-up indicator
  if(hippo.doubleJump){
    const pulse=Math.sin(animTimer*0.08)*0.3+0.7;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(260,4,150,22);
    ctx.fillStyle=`rgba(255,215,0,${pulse})`;ctx.font='bold 11px "Segoe UI"';ctx.textAlign='left';
    ctx.fillText('⭐ DOUBLE JUMP',268,20);
  }

  // Boss HP bar
  if(curLevel===9&&!bossDefeated){
    const boss=enemyData.find(e=>e.type==='boss');
    if(boss){
      ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(W/2-90,48,180,26);
      ctx.fillStyle='#e74c3c';ctx.font='bold 13px "Segoe UI"';ctx.textAlign='center';
      ctx.fillText('🌳 GROVE GUARDIAN',W/2,64);
      const hpW=160;
      ctx.fillStyle='#333';ctx.fillRect(W/2-hpW/2,70,hpW,8);
      const hpGrad=ctx.createLinearGradient(W/2-hpW/2,0,W/2+hpW/2,0);
      hpGrad.addColorStop(0,'#e74c3c');hpGrad.addColorStop(1,'#ff6b6b');
      ctx.fillStyle=hpGrad;ctx.fillRect(W/2-hpW/2,70,hpW*(boss.hp/5),8);
    }
  }

  // Bottom hint
  const hint=curLevel===9&&!bossDefeated?'Jump on the Guardian\'s head 5 times!':'ESC to pause  |  Jump on enemies to stomp!';
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='10px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText(hint,W/2,H-6);

  // Mute button (top-right corner)
  const mbtnX=W-30,mbtnY=H-30;
  const mh=mouseX>=mbtnX-12&&mouseX<=mbtnX+12&&mouseY>=mbtnY-12&&mouseY<=mbtnY+12;
  ctx.fillStyle=mh?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.arc(mbtnX,mbtnY,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='14px Arial';ctx.textAlign='center';
  ctx.fillText(musicEnabled?'🔊':'🔇',mbtnX,mbtnY+5);
  if(mh&&justClicked)toggleMusic();

  // Mobile touch controls (semi-transparent)
  ctx.globalAlpha=0.25;
  // Left button
  ctx.fillStyle=touchLeft?'#fff':'#aaa';ctx.beginPath();
  roundRect(10,H-80,60,60,12);ctx.fill();
  ctx.fillStyle='#333';ctx.font='28px Arial';ctx.textAlign='center';
  ctx.fillText('◀',40,H-38);
  // Right button
  ctx.fillStyle=touchRight?'#fff':'#aaa';ctx.beginPath();
  roundRect(80,H-80,60,60,12);ctx.fill();
  ctx.fillStyle='#333';ctx.fillText('▶',110,H-38);
  // Jump button
  ctx.fillStyle=touchJump?'#fff':'#aaa';ctx.beginPath();
  roundRect(W-70,H-80,60,60,12);ctx.fill();
  ctx.fillStyle='#333';ctx.fillText('▲',W-40,H-38);
  ctx.globalAlpha=1;
}

// ── Game Over ────────────────────────
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#e74c3c';ctx.font='bold 40px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText('OUCH!',W/2,H/2-40);
  ctx.fillStyle='#fff';ctx.font='18px "Segoe UI"';
  ctx.fillText(deathMessage||'Hippo took a tumble!',W/2,H/2+5);
  if(button(W/2-60,H/2+35,120,40,'↺ RETRY','#e74c3c')||keys['KeyR']){
    if(keys['KeyR'])keys['KeyR']=false;
    initLevel(curLevel);state='playing';sfxChime();startAmbient(levels[curLevel].theme);
  }
  if(button(W/2-60,H/2+85,120,40,'← LEVELS','#7f8c8d')){
    state='levelSelect';sfxChime();stopAmbient();
  }
}

// ── Level Complete ───────────────────
function drawLevelComplete(){
  ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);

  // Star rating
  const pct=collectedFoodCount/totalFoodInLevel;
  const stars=pct>=0.9?3:pct>=0.6?2:1;

  ctx.fillStyle='#2ecc71';ctx.font='bold 38px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText('LEVEL COMPLETE! 🎉',W/2,H/2-80);

  // Stars
  const starY=H/2-30;
  ctx.font='40px Arial';
  for(let s=0;s<3;s++){
    const sx=W/2-60+s*60;
    ctx.fillText(s<stars?'⭐':'☆',sx,starY);
  }

  ctx.fillStyle='#f1c40f';ctx.font='bold 22px "Segoe UI"';
  ctx.fillText(`Score: ${score}`,W/2,H/2+10);
  ctx.fillStyle='#ccc';ctx.font='15px "Segoe UI"';
  ctx.fillText(`Collected: ${collectedFoodCount}/${totalFoodInLevel}  |  Total: ${totalScore}`,W/2,H/2+40);

  if(curLevel===9){
    ctx.fillStyle='#f1c40f';ctx.font='bold 24px "Segoe UI"';
    ctx.fillText('🏆 YOU SAVED THE GOLDEN WATERMELON! 🏆',W/2,H/2+80);
  }

  const btnY=curLevel===9?H/2+115:H/2+75;
  if(curLevel<9&&button(W/2-70,btnY,140,40,'▶ NEXT LEVEL','#27ae60')){
    curLevel++;state='story';sfxChime();
  }
  if(button(W/2-70,btnY+50,140,40,'← LEVELS','#7f8c8d')){
    state='levelSelect';sfxChime();
  }
}

// ── Game Complete ────────────────────
function drawGameComplete(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  // Fireworks
  for(let i=0;i<30;i++){
    const fx=((i*173+animTimer*3)%W),fy=((i*89+animTimer*2)%H);
    ctx.fillStyle=`hsl(${(i*40+animTimer*2)%360},80%,60%)`;
    ctx.beginPath();ctx.arc(fx,fy,3+Math.sin(animTimer*0.1+i)*2,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#f9e654';ctx.font='bold 44px "Segoe UI"';ctx.textAlign='center';
  ctx.fillText('CONGRATULATIONS!',W/2,120);
  ctx.fillStyle='#fff';ctx.font='20px "Segoe UI"';
  ctx.fillText('Hippo has collected the Golden Watermelon!',W/2,165);
  ctx.fillText('All the lands are at peace.',W/2,195);
  ctx.fillStyle='#f1c40f';ctx.font='bold 28px "Segoe UI"';
  ctx.fillText(`Final Score: ${totalScore}`,W/2,250);

  if(button(W/2-80,300,160,45,'🏠 MENU','#27ae60')){
    state='title';sfxChime();stopAmbient();
  }
  if(button(W/2-80,360,160,45,'↺ PLAY AGAIN','#3498db')){
    levelCompleted=[];totalScore=0;curLevel=0;state='story';sfxChime();stopAmbient();
  }
}

// ── Update Logic ─────────────────────
function updateGame(){
  // Decrement stun timer
  if(hippo.stunTimer>0)hippo.stunTimer--;

  // Movement (only accept input when not stunned)
  let mx=0;
  if(hippo.stunTimer<=0){
    if(keys['ArrowRight']||keys['KeyD']||touchRight)mx=1;
    if(keys['ArrowLeft']||keys['KeyA']||touchLeft)mx=-1;

    if(mx!==0){
      hippo.vx=mx*hippo.spd;
      hippo.face=mx;
    }else{
      hippo.vx*=0.7;
      if(Math.abs(hippo.vx)<0.3)hippo.vx=0;
    }
  }else{
    // During stun, apply friction
    hippo.vx*=0.85;
  }

  // Jump (only when not stunned)
  if(hippo.stunTimer<=0){
    const jumpPressed=keys['ArrowUp']||keys['KeyW']||keys['Space']||touchJump;
    if(jumpPressed&&hippo.onGround){
      hippo.vy=-hippo.jmp;hippo.onGround=false;sfxJump();
    }else if(jumpPressed&&!hippo.onGround&&hippo.doubleJump&&!hippo.djUsed){
      hippo.vy=-hippo.jmp*0.85;hippo.djUsed=true;sfxJump();
      spawnP(hippo.x+hippo.w/2,hippo.y+hippo.h/2,8,['#f1c40f','#fff','#f39c12'],5);
    }
  }

  // Physics
  hippo.vy+=hippo.grav;
  hippo.x+=hippo.vx;
  hippo.y+=hippo.vy;

  // Boundaries
  const L=levels[curLevel];
  if(hippo.x<0)hippo.x=0;
  if(hippo.x>L.w-hippo.w)hippo.x=L.w-hippo.w;

  // Reset jump state when on ground
  if(hippo.onGround){hippo.djUsed=false;}

  // Platform collision
  hippo.onGround=false;
  for(let p of platData){
    if(hippo.x+hippo.w>p.x&&hippo.x<p.x+p.w&&
       hippo.y+hippo.h>=p.y&&hippo.y+hippo.h-hippo.vy<=p.y+12){
      const wasAirborne=!hippo.onGround;
      hippo.y=p.y-hippo.h;hippo.vy=0;hippo.onGround=true;
      if(wasAirborne&&Math.abs(hippo.vy)>4){
        spawnP(hippo.x+hippo.w/2,hippo.y+hippo.h,6,['#8a7a6a','#aa9a8a','#6a5a4a'],2);
      }
      if(p.bouncy){hippo.vy=-hippo.jmp*1.5;hippo.onGround=false;sfxJump();}
    }
  }

  // Moving platforms
  for(let p of movingPlats){
    if(p.mx)p.x=p.origX+Math.sin(animTimer*p.spd*0.02+p.phase)*p.mx;
    if(p.my)p.y=p.origY+Math.sin(animTimer*p.spd*0.02+p.phase)*p.my;
  }

  // Spike collision
  for(let s of spikeData){
    if(hippo.x+hippo.w>s.x+4&&hippo.x<s.x+s.w-4&&
       hippo.y+hippo.h>s.y&&hippo.y<s.y+s.h){
      sfxHurt();screenShake=15;state='gameover';stopAmbient();deathMessage='Hippo touched a spike! Be careful!';
      return;
    }
  }

  // Fall in pit
  if(hippo.y>L.h+100){
    sfxHurt();screenShake=10;state='gameover';stopAmbient();deathMessage='Hippo fell into the abyss!';
    return;
  }

  // Enemy logic
  for(let e of enemyData){
    if(e.hitTimer>0){e.hitTimer--;continue;}
    e.x+=e.spd;
    if(e.x<=e.startX||e.x+e.w>=e.endX)e.spd*=-1;

    // Stomp check (player falling on enemy)
    const playerTop=hippo.y,playerBot=hippo.y+hippo.h;
    const enemyTop=e.y,enemyBot=e.y+e.h;
    const playerMid=hippo.x+hippo.w/2,enemyMid=e.x+e.w/2;

    if(Math.abs(playerMid-enemyMid)<(hippo.w+e.w)/2-4&&
       playerBot>=enemyTop&&playerBot<=enemyTop+16&&
       hippo.vy>0){
      // Stomp!
      sfxStomp();spawnP(e.x+e.w/2,e.y+e.h/2,12,['#f1c40f','#e67e22']);
      hippo.vy=-hippo.jmp*0.7;
      if(e.type==='boss'){
        e.hp--;e.hitTimer=20;screenShake=12;screenFlash=0.6;
        spawnFT(e.x,e.y-20,`${e.hp}/5 hits!`,'#ff0',16,true);
        if(e.hp<=0){
          bossDefeated=true;
          const idx=enemyData.indexOf(e);
          enemyData.splice(idx,1);
          spawnP(e.x+e.w/2,e.y+e.h/2,50,['#f1c40f','#2ecc71','#fff','#e74c3c','#9b59b6','#3498db'],10);
          screenFlash=1.0;screenShake=20;
          sfxVictory();
          spawnFT(e.x,e.y-40,'BOSS DEFEATED!','#2ecc71',24,true);
          spawnFT(e.x,e.y-10,'Reach the flag!','#f1c40f',16,true);
        }
      }else{
        const idx=enemyData.indexOf(e);
        enemyData.splice(idx,1);
        spawnFT(e.x,e.y-10,'STOMP!','#f1c40f',14,true);
      }
      continue;
    }

    // Normal collision
    if(hippo.x+hippo.w>e.x+2&&hippo.x<e.x+e.w-2&&
       hippo.y+hippo.h>e.y+2&&hippo.y<e.y+e.h-2){
      if(hippo.invincible<=0){
        sfxHurt();screenShake=6;
        hippo.stunTimer=12;
        hippo.vy=-3;
        hippo.vx=(hippo.x<e.x)?-7:7;
        hippo.invincible=30;
      }
    }
  }

  // Food collision
  for(let f of foodData){
    if(f.collected)continue;
    if(hippo.x+hippo.w>f.x&&hippo.x<f.x+30&&
       hippo.y+hippo.h>f.y&&hippo.y<f.y+30){
      f.collected=true;
      if(f.health===3){
        // Star power-up
        hippo.doubleJump=true;hippo.djUsed=false;
        sfxPowerup();spawnP(f.x+15,f.y+15,20,['#f1c40f','#fff','#f39c12'],6);
        spawnFT(f.x,f.y,'⭐ DOUBLE JUMP!','#f1c40f',20,true);
      }else if(f.health===1){
        score+=f.v;sfxCoin();
        spawnP(f.x+15,f.y+15,15,['#2ecc71','#fff','#27ae60'],5);
        spawnFT(f.x,f.y,'+'+f.v,'#2ecc71',16,true);
      }else{
        score+=f.v;sfxCoin();
        spawnP(f.x+15,f.y+15,6,['#e67e22','#f39c12'],3);
        spawnFT(f.x,f.y,'+'+f.v,'#f1c40f',13,false);
      }
    }
  }

  // Flag collision
  if(hippo.x+hippo.w>flagData.x&&hippo.x<flagData.x+flagData.w&&
     hippo.y+hippo.h>flagData.y&&hippo.y<flagData.y+flagData.h){
    // Check boss defeated for level 10
    if(curLevel===9&&!bossDefeated)return;
    totalScore+=score;
    if(!levelCompleted[curLevel])levelCompleted[curLevel]=true;
    sfxVictory();screenShake=8;stopAmbient();
    state=curLevel===9?'gameComplete':'win';
  }

  // Invincibility timer
  if(hippo.invincible>0)hippo.invincible--;

  // Update camera
  updateCam(hippo.x+hippo.w/2,hippo.y+hippo.h/2,L.w,L.h);

  // Screen shake decay
  if(screenShake>0){screenShake*=0.85;if(screenShake<0.3)screenShake=0;}
  if(screenFlash>0){screenFlash-=0.03;if(screenFlash<0)screenFlash=0;}

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.a-=p.d;
    if(p.a<=0)particles.splice(i,1);
  }
  // Floating text
  for(let i=floatTexts.length-1;i>=0;i--){
    let t=floatTexts[i];t.y+=t.vy;t.a-=0.015;
    if(t.a<=0)floatTexts.splice(i,1);
  }

  // Trail
  hippo.trail.push({x:hippo.x+hippo.w/2,y:hippo.y+hippo.h/2,a:0.4});
  if(hippo.trail.length>8)hippo.trail.shift();
  for(let tr of hippo.trail)tr.a-=0.05;
}

// ── Main Draw ────────────────────────
function drawGame(){
  const L=levels[curLevel];
  const theme=L.theme;

  // Sky
  drawSky(theme);
  // Background hills
  drawBackgroundHills(theme);

  ctx.save();
  // Apply camera & shake
  if(screenShake>0){
    const dx=(Math.random()-0.5)*screenShake,dy=(Math.random()-0.5)*screenShake;
    ctx.translate(dx,dy);
  }
  ctx.translate(-camX,-camY);

  // Decorations
  drawDecorations(theme);
  // Platforms
  drawPlatforms(theme);
  // Spikes
  drawSpikes();
  // Flag
  drawFlag();
  // Food
  ctx.font='22px Arial';ctx.textAlign='center';
  for(let f of foodData){
    if(f.collected)continue;
    const fx=f.x+15-camX,fy=f.y+15-camY;
    if(fx<-30||fx>W+30)continue;
    const bob=Math.sin(animTimer*0.05+f.x*0.02)*4;
    ctx.fillText(f.e,fx,fy+bob);
    if(f.health===3){
      ctx.fillStyle='rgba(255,215,0,0.3)';
      ctx.beginPath();ctx.arc(fx,fy+bob,18+Math.sin(animTimer*0.08)*3,0,Math.PI*2);ctx.fill();
    }
  }
  // Enemies
  drawEnemies();
  // Hippo trail
  ctx.globalAlpha=0.2;
  for(let tr of hippo.trail){
    ctx.fillStyle='#b8b8d4';
    ctx.beginPath();ctx.arc(tr.x-camX,tr.y-camY,5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Hippo
  const hx=hippo.x-camX,hy=hippo.y-camY;
  ctx.save();ctx.translate(hx,hy);drawHippo();ctx.restore();

  // Particles
  for(let p of particles){
    ctx.globalAlpha=p.a;
    ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x-camX,p.y-camY,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  // Floating texts
  for(let t of floatTexts){
    ctx.globalAlpha=t.a;
    ctx.fillStyle=t.color;ctx.font=(t.bold?'bold ':'')+t.size+'px "Segoe UI"';
    ctx.textAlign='center';ctx.fillText(t.text,t.x-camX,t.y-camY);
  }
  ctx.globalAlpha=1;

  ctx.restore();

  // Screen flash (boss hits, etc)
  if(screenFlash>0){
    ctx.fillStyle=`rgba(255,50,50,${screenFlash*0.4})`;
    ctx.fillRect(0,0,W,H);
  }

  // HUD
  drawHUD();
}

// ── Main Loop ────────────────────────
function loop(){
  animTimer++;
  if(hippo.onGround&&Math.abs(hippo.vx)>0.5)hippoFrame++;
  else if(!hippo.onGround)hippoFrame+=0.3;

  // Pause
  if(keys['Escape']&&state==='playing'){
    state='paused';
    keys['Escape']=false;
  }

  if(state==='title'){drawTitle();}
  else if(state==='howTo'){drawHowTo();}
  else if(state==='levelSelect'){drawLevelSelect();}
  else if(state==='story'){drawStory();}
  else if(state==='playing'){updateGame();drawGame();}
  else if(state==='paused'){
    drawGame();
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.font='bold 40px "Segoe UI"';ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2-20);
    ctx.font='18px "Segoe UI"';ctx.fillText('Press ESC to resume',W/2,H/2+20);
    if(button(W/2-60,H/2+50,120,40,'← QUIT','#e74c3c')){state='levelSelect';sfxChime();stopAmbient();}
    if(keys['Escape']){state='playing';keys['Escape']=false;}
  }
  else if(state==='win'){drawLevelComplete();}
  else if(state==='gameover'){drawGameOver();}
  else if(state==='gameComplete'){drawGameComplete();}

  // Global ESC for menus
  if(keys['Escape']&&(state==='levelSelect'||state==='story'||state==='howTo')){
    state='title';keys['Escape']=false;
  }

  justClicked=false;
  requestAnimationFrame(loop);
}

// ── Initialize ───────────────────────
canvas.addEventListener('contextmenu',e=>e.preventDefault());
// Load saved progress
try{
  const saved=JSON.parse(localStorage.getItem('hippoFeast'));
  if(saved){levelCompleted=saved.levelCompleted||[];totalScore=saved.totalScore||0;}
}catch(e){}
// Auto-save progress periodically
setInterval(()=>{
  try{localStorage.setItem('hippoFeast',JSON.stringify({levelCompleted,totalScore}));}catch(e){}
},2000);

loop();
</script>
