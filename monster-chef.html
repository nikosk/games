<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster Chef - Fun for Toddlers</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --pot-color: #4a4a4a;
            --liquid-color: #9c27b0;
            --monster-color: #4caf50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            touch-action: none;
        }

        /* Header */
        .header {
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0 white;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #576574;
            font-size: 1.1rem;
        }

        /* Monster Area */
        .game-area {
            position: relative;
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .monster-container {
            position: relative;
            width: 250px;
            height: 250px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .monster-container:active {
            transform: scale(0.9);
        }

        .monster-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        .monster-body {
            fill: var(--monster-color);
            transition: fill 0.5s;
        }

        .eye {
            fill: white;
            transition: transform 0.2s;
        }

        .pupil {
            fill: #333;
        }

        .mouth {
            fill: #333;
            transition: d 0.3s;
        }

        /* Pot Area */
        .pot-container {
            position: relative;
            width: 200px;
            height: 150px;
            margin-top: -40px;
            z-index: 5;
        }

        .pot {
            width: 100%;
            height: 100%;
            background: var(--pot-color);
            border-radius: 50% 50% 40% 40%;
            position: relative;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.4), 0 15px 30px rgba(0,0,0,0.2);
            border-top: 10px solid #333;
        }

        .liquid {
            position: absolute;
            top: 5px;
            left: 10px;
            right: 10px;
            bottom: 60%;
            background: var(--liquid-color);
            border-radius: 50%;
            transition: background 0.5s;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: bubble-up 2s infinite ease-in;
        }

        @keyframes bubble-up {
            0% { transform: translateY(50px) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-20px) scale(1.2); opacity: 0; }
        }

        /* Ingredients Shelf */
        .shelf {
            width: 100%;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(5px);
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            border-top: 5px solid #fff;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
            z-index: 100;
        }

        .ingredient {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: grab;
            box-shadow: 0 5px 0 #ddd;
            transition: transform 0.2s, box-shadow 0.2s;
            touch-action: none;
            position: relative;
        }

        .ingredient:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 0 #ddd;
        }

        .ingredient:active {
            cursor: grabbing;
        }

        .dragging {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            transform: scale(1.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Animations */
        .bounce {
            animation: bounce-anim 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounce-anim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2) translateY(-20px); }
        }

        .giggle {
            animation: giggle-anim 0.3s infinite;
        }

        @keyframes giggle-anim {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        /* Reaction Effects */
        .particles {
            position: absolute;
            pointer-events: none;
            z-index: 1000;
        }

        .particle {
            position: absolute;
            animation: particle-anim 1s forwards;
        }

        @keyframes particle-anim {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }

        /* Message Overlay */
        #speechBubble {
            position: absolute;
            top: -60px;
            right: -80px;
            background: white;
            padding: 15px 25px;
            border-radius: 30px;
            font-weight: 600;
            color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #speechBubble.show {
            opacity: 1;
            transform: scale(1) rotate(5deg);
        }

        #speechBubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 20px;
            border-width: 15px 15px 0 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Monster Chef 🧑‍🍳</h1>
        <p class="subtitle">Drag food to the pot to feed the monster!</p>
    </div>

    <div class="game-area" id="gameArea">
        <div class="monster-container" id="monster" onclick="giggle()">
            <div id="speechBubble">Yummy!</div>
            <svg class="monster-svg" viewBox="0 0 200 200">
                <path class="monster-body" d="M40,160 Q40,40 100,40 Q160,40 160,160 Q160,180 100,180 Q40,180 40,160" />
                
                <!-- Eyes -->
                <g id="eyesGroup">
                    <circle class="eye" cx="75" cy="90" r="15" />
                    <circle class="pupil" id="pupilL" cx="75" cy="90" r="6" />
                    
                    <circle class="eye" cx="125" cy="90" r="15" />
                    <circle class="pupil" id="pupilR" cx="125" cy="90" r="6" />
                </g>

                <!-- Mouth -->
                <path class="mouth" id="monsterMouth" d="M70,130 Q100,140 130,130" />
                
                <!-- Cheeks -->
                <circle fill="rgba(255,0,0,0.2)" cx="60" cy="115" r="8" />
                <circle fill="rgba(255,0,0,0.2)" cx="140" cy="115" r="8" />
            </svg>
        </div>

        <div class="pot-container" id="potContainer">
            <div class="pot">
                <div class="liquid" id="liquid">
                    <div class="bubble" style="left: 20%; animation-delay: 0.1s; width: 10px; height: 10px;"></div>
                    <div class="bubble" style="left: 45%; animation-delay: 0.5s; width: 15px; height: 15px;"></div>
                    <div class="bubble" style="left: 70%; animation-delay: 0.8s; width: 8px; height: 8px;"></div>
                    <div class="bubble" style="left: 30%; animation-delay: 1.2s; width: 12px; height: 12px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="shelf" id="shelf">
        <!-- Ingredients will be injected by JS -->
    </div>

    <script>
        const ingredients = [
            { id: 'mushroom', emoji: '🍄', color: '#ff5252', reaction: 'grow' },
            { id: 'strawberry', emoji: '🍓', color: '#ff4081', reaction: 'pink' },
            { id: 'pretzel', emoji: '🥨', color: '#795548', reaction: 'spin' },
            { id: 'ice', emoji: '🧊', color: '#00bcd4', reaction: 'freeze' },
            { id: 'balloon', emoji: '🎈', color: '#673ab7', reaction: 'float' },
            { id: 'corn', emoji: '🌽', color: '#ffeb3b', reaction: 'yellow' },
            { id: 'broccoli', emoji: '🥦', color: '#4caf50', reaction: 'green' },
            { id: 'cookie', emoji: '🍪', color: '#8d6e63', reaction: 'happy' }
        ];

        const monster = document.getElementById('monster');
        const liquid = document.getElementById('liquid');
        const monsterMouth = document.getElementById('monsterMouth');
        const shelf = document.getElementById('shelf');
        const speechBubble = document.getElementById('speechBubble');
        const gameArea = document.getElementById('gameArea');

        let isDragging = false;
        let dragElement = null;
        let currentIngredient = null;

        // Initialize Shelf
        ingredients.forEach(item => {
            const div = document.createElement('div');
            div.className = 'ingredient';
            div.innerHTML = item.emoji;
            div.dataset.id = item.id;
            
            div.addEventListener('pointerdown', onPointerDown);
            shelf.appendChild(div);
        });

        function onPointerDown(e) {
            isDragging = true;
            currentIngredient = ingredients.find(i => i.id === e.target.dataset.id);
            
            dragElement = e.target.cloneNode(true);
            dragElement.classList.add('dragging');
            document.body.appendChild(dragElement);
            
            updateDragPosition(e);
            
            // Open monster mouth in anticipation
            monsterMouth.setAttribute('d', 'M70,130 Q100,160 130,130');
        }

        window.addEventListener('pointermove', e => {
            if (!isDragging) return;
            updateDragPosition(e);
            
            // Check if over pot
            const potRect = document.getElementById('potContainer').getBoundingClientRect();
            if (e.clientX > potRect.left && e.clientX < potRect.right && 
                e.clientY > potRect.top && e.clientY < potRect.bottom) {
                dragElement.style.transform = 'scale(1.4) rotate(10deg)';
            } else {
                dragElement.style.transform = 'scale(1.2)';
            }
        });

        window.addEventListener('pointerup', e => {
            if (!isDragging) return;
            
            const potRect = document.getElementById('potContainer').getBoundingClientRect();
            if (e.clientX > potRect.left && e.clientX < potRect.right && 
                e.clientY > potRect.top && e.clientY < potRect.bottom) {
                applyIngredient();
            } else {
                // Close mouth if missed
                monsterMouth.setAttribute('d', 'M70,130 Q100,140 130,130');
            }
            
            dragElement.remove();
            isDragging = false;
        });

        function updateDragPosition(e) {
            dragElement.style.left = (e.clientX - 35) + 'px';
            dragElement.style.top = (e.clientY - 35) + 'px';
        }

        function applyIngredient() {
            // Visual feedback on pot
            liquid.style.background = currentIngredient.color;
            createParticles(window.innerWidth / 2, window.innerHeight / 2 + 50, currentIngredient.emoji);
            
            // Monster reaction
            monster.classList.add('bounce');
            setTimeout(() => monster.classList.remove('bounce'), 500);
            
            // Change monster color
            document.querySelector('.monster-body').style.fill = currentIngredient.color;

            // Physical Transformation
            if (currentIngredient.reaction === 'grow') {
                monster.style.transform = 'scale(1.3)';
            } else if (currentIngredient.reaction === 'freeze') {
                monster.style.transform = 'scale(0.7)';
            } else if (currentIngredient.reaction === 'float') {
                monster.style.transform = 'translateY(-50px) rotate(10deg)';
            } else {
                monster.style.transform = 'scale(1)';
            }
            
            // Reaction Specifics
            const mouthStates = {
                happy: 'M70,140 Q100,160 130,140',
                surprised: 'M85,140 Q100,160 115,140',
                default: 'M70,130 Q100,140 130,130'
            };

            monsterMouth.setAttribute('d', mouthStates.happy);
            
            // Show message
            const messages = ["YUMMY!", "OH WOW!", "SILLY!", "COOL!", "I LIKE IT!", "MORE!"];
            speechBubble.textContent = messages[Math.floor(Math.random() * messages.length)];
            speechBubble.classList.add('show');
            
            setTimeout(() => {
                speechBubble.classList.remove('show');
                monsterMouth.setAttribute('d', mouthStates.default);
            }, 2000);

            // Audio-like feedback (vibration if available)
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function giggle() {
            monster.classList.add('giggle');
            speechBubble.textContent = "HEHEHE!";
            speechBubble.classList.add('show');
            
            setTimeout(() => {
                monster.classList.remove('giggle');
                speechBubble.classList.remove('show');
            }, 1000);
        }

        function createParticles(x, y, emoji) {
            const container = document.createElement('div');
            container.className = 'particles';
            container.style.left = x + 'px';
            container.style.top = y + 'px';
            document.body.appendChild(container);

            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = emoji;
                p.style.fontSize = (Math.random() * 20 + 10) + 'px';
                
                const angle = (Math.PI * 2 / 8) * i;
                const dist = Math.random() * 100 + 50;
                p.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
                p.style.setProperty('--dy', (Math.sin(angle) * dist - 50) + 'px');
                
                container.appendChild(p);
            }
            
            setTimeout(() => container.remove(), 1000);
        }

        // Keep pupils following mouse/drag
        window.addEventListener('pointermove', e => {
            const pupils = document.querySelectorAll('.pupil');
            pupils.forEach(p => {
                const rect = p.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
                const dist = 4;
                p.setAttribute('cx', parseFloat(p.getAttribute('data-orig-x') || p.getAttribute('cx')) + Math.cos(angle) * dist);
                p.setAttribute('cy', parseFloat(p.getAttribute('data-orig-y') || p.getAttribute('cy')) + Math.sin(angle) * dist);
            });
        });

        // Store original eye positions
        document.querySelectorAll('.pupil').forEach(p => {
            p.setAttribute('data-orig-x', p.getAttribute('cx'));
            p.setAttribute('data-orig-y', p.getAttribute('cy'));
        });

    </script>
</body>
</html>
