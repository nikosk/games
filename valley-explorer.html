  }
  
  for (let i = 0; i < 3; i++) {
    const x = startX + Math.random() * viewW;
    const y = startY + Math.random() * viewH;
    villages.push(new Village(x, y));
  }
  
  for (let i = 0; i < 10; i++) {
    const x = startX + Math.random() * viewW - 3000;
    const y = startY + Math.random() * viewH;
    cacti.push(new Cactus(x, y));
  }
  
  for (let i = 0; i < 8; i++) {
    const x = startX + Math.random() * viewW;
    const y = startY + Math.random() * viewH - 3000;
    snowmen.push(new Snowman(x, y));
    igloos.push(new Igloo(x + Math.random() * 200 - 100, y + Math.random() * 200));
  }
  
  for (let i = 0; i < 15; i++) {
    const x = startX + Math.random() * viewW + 3000;
    const y = startY + Math.random() * viewH;
    seashells.push(new Seashell(x, y));
    if (i < 5) sandcastles.push(new Sandcastle(x + Math.random() * 100, y + Math.random() * 100));
  }
  
  for (let i = 0; i < 6; i++) {
    const x = startX + Math.random() * viewW + 3000;
    const y = startY + Math.random() * viewH;
    crabs.push(new Crab(x, y));
  }
  
  for (let i = 0; i < 15; i++) {
    const x = startX + Math.random() * viewW + 3000;
    const y = startY + Math.random() * viewH;
    palmTrees.push(new PalmTree(x, y));
  }
  
  for (let i = 0; i < 10; i++) {
    const x = startX + Math.random() * viewW - 3000;
    const y = startY + Math.random() * viewH;
    mountainPeaks.push(new MountainPeak(x, y));
  }
  
  for (let i = 0; i < 8; i++) {
    const x = startX + Math.random() * viewW;
    const y = startY + Math.random() * viewH - 3000;
    animals.push(new Animal(x, y, 'penguin'));
    if (Math.random() < 0.4) animals.push(new Animal(x + Math.random() * 50, y + Math.random() * 50, 'seal'));
  }
  
  for (let i = 0; i < 6; i++) {
    const x = startX + Math.random() * viewW;
    const y = startY + Math.random() * viewH - 2800;
    animals.push(new Animal(x, y, 'owl'));
  }
  
  for (let i = 0; i < 5; i++) {
    const x = startX + Math.random() * viewW + 3000;
    const y = startY + Math.random() * viewH;
    animals.push(new Animal(x, y, Math.random() < 0.5 ? 'dolphin' : 'fish_large'));
  }
  
  for (let i = 0; i < 3; i++) {
    const x = startX + Math.random() * viewW + 3200;
    const y = startY + Math.random() * viewH;
    animals.push(new Animal(x, y, 'whale'));
  }
  
  for (let i = 0; i < 8; i++) {
    const x = startX + Math.random() * viewW - 2800;
    const y = startY + Math.random() * viewH;
    animals.push(new Animal(x, y, Math.random() < 0.5 ? 'wolf' : 'eagle'));
  }
  
  for (let i = 0; i < 6; i++) {
    const x = startX + Math.random() * viewW + 2800;
    const y = startY + Math.random() * viewH;
    animals.push(new Animal(x, y, Math.random() < 0.5 ? 'flamingo' : 'pelican'));
  }
}

function drawGround() {
  const tileSize = 16;
  const startX = Math.floor(worldX / tileSize) * tileSize;
  const startY = Math.floor(worldY / tileSize) * tileSize;
  
  for (let y = startY - tileSize; y < worldY + canvas.height + tileSize; y += tileSize) {
    for (let x = startX - tileSize; x < worldX + canvas.width + tileSize; x += tileSize) {
      const biome = getBiome(x, y);
      const colors = BIOME_COLORS[biome];
      const colorIdx = Math.floor(seededRandom(Math.floor(x / tileSize), Math.floor(y / tileSize)) * colors.length);
      
      ctx.fillStyle = colors[colorIdx];
      ctx.fillRect(x - worldX, y - worldY, tileSize + 1, tileSize + 1);
      
      if (biome === 'water' || biome === 'ocean') {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
        const waveOffset = Math.sin(Date.now() * 0.002 + x * 0.1 + y * 0.1) * 3;
        ctx.beginPath();
        ctx.moveTo(x - worldX, y - worldY + tileSize / 2 + waveOffset);
        ctx.quadraticCurveTo(x - worldX + tileSize / 2, y - worldY + tileSize / 2 - 2 + waveOffset, x - worldX + tileSize, y - worldY + tileSize / 2 + waveOffset);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.stroke();
      }
      
      if (biome === 'snow' || biome === 'ice') {
        if (seededRandom(x + 100, y) < 0.1) {
          ctx.fillStyle = 'rgba(200, 230, 255, 0.6)';
          ctx.beginPath();
          ctx.arc(x - worldX + 8, y - worldY + 8, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        if (seededRandom(x, y + 100) < 0.08) {
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(x - worldX + 4, y - worldY + 2);
          ctx.lineTo(x - worldX + 8, y - worldY + 6);
          ctx.lineTo(x - worldX + 12, y - worldY + 2);
          ctx.stroke();
        }
      }
      
      if (biome === 'desert' || biome === 'sand') {
        if (seededRandom(x + 50, y + 50) < 0.05) {
          ctx.fillStyle = '#D2691E';
          ctx.beginPath();
          ctx.moveTo(x - worldX + 8, y - worldY + 14);
          ctx.lineTo(x - worldX + 4, y - worldY + 4);
          ctx.lineTo(x - worldX + 8, y - worldY + 8);
          ctx.lineTo(x - worldX + 12, y - worldY + 2);
          ctx.lineTo(x - worldX + 8, y - worldY + 14);
          ctx.fill();
        }
        if (seededRandom(x, y + 200) < 0.03) {
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(x - worldX + 6, y - worldY + 8, 4, 6);
          ctx.fillStyle = '#90EE90';
          ctx.beginPath();
          ctx.arc(x - worldX + 8, y - worldY + 6, 3, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      
      if (biome === 'seaside') {
        if (seededRandom(x + 300, y) < 0.06) {
          ctx.fillStyle = '#FFE4B5';
          ctx.beginPath();
          ctx.ellipse(x - worldX + 8, y - worldY + 10, 4, 3, 0.3, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#F0E68C';
          ctx.beginPath();
          ctx.arc(x - worldX + 6, y - worldY + 9, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      
      if (biome === 'mountain' || biome === 'peak') {
        if (seededRandom(x + 400, y + 400) < 0.15) {
          ctx.fillStyle = biome === 'peak' ? '#e0e0e0' : '#606060';
          ctx.beginPath();
          ctx.moveTo(x - worldX, y - worldY + 16);
          ctx.lineTo(x - worldX + 8, y - worldY);
          ctx.lineTo(x - worldX + 16, y - worldY + 16);
          ctx.fill();
        }
      }
      
      if (biome === 'grass' && seededRandom(x, y) < 0.15) {
        ctx.fillStyle = '#90EE90';
        ctx.fillRect(x - worldX + 4, y - worldY, 2, 6);
        ctx.fillRect(x - worldX + 10, y - worldY + 2, 2, 5);
      }
      
      if (biome === 'orchard' && seededRandom(x + 500, y) < 0.1) {
        ctx.fillStyle = '#FF6B6B';
        ctx.beginPath();
        ctx.arc(x - worldX + 8, y - worldY + 6, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#228B22';
        ctx.fillRect(x - worldX + 7, y - worldY + 2, 2, 3);
      }
    }
  }
}

function getAllEntities() {
  return [...animals, ...trees, ...bushes, ...flowers, ...bamboos, ...lilyPads, ...tumbleweeds, ...corals, ...seaweeds, ...crystals, ...butterflies, ...bees, ...fish, ...rocks, ...mushrooms, ...apples, ...cacti, ...snowmen, ...seashells, ...crabs, ...palmTrees, ...igloos, ...sandcastles];
}

function findEntityAt(screenX, screenY) {
  const worldPx = screenX + worldX;
  const worldPy = screenY + worldY;
  
  for (const entity of getAllEntities().reverse()) {
    if (entity.interactive !== false && entity.contains(worldPx, worldPy)) {
      return entity;
    }
  }
  return null;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const region = currentRegion;
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  
  if (region.includes('north')) {
    gradient.addColorStop(0, '#4a6fa5');
    gradient.addColorStop(0.5, '#87ceeb');
    gradient.addColorStop(1, '#e8f4fc');
  } else if (region.includes('south')) {
    gradient.addColorStop(0, '#ff8c42');
    gradient.addColorStop(0.4, '#ffcc80');
    gradient.addColorStop(1, '#f4a460');
  } else if (region.includes('east')) {
    gradient.addColorStop(0, '#00b4d8');
    gradient.addColorStop(0.5, '#90e0ef');
    gradient.addColorStop(1, '#f5deb3');
  } else if (region.includes('west')) {
    gradient.addColorStop(0, '#6366f1');
    gradient.addColorStop(0.6, '#a5b4fc');
    gradient.addColorStop(1, '#708090');
  } else {
    gradient.addColorStop(0, '#87CEEB');
    gradient.addColorStop(0.7, '#B0E0E6');
    gradient.addColorStop(1, '#98FB98');
  }
  
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  if (region.includes('north')) {
    drawSnowfall();
  } else if (region.includes('south')) {
    drawHeatWaves();
  } else if (region.includes('east')) {
    drawWaves();
  } else if (region.includes('west')) {
    drawMountainMist();
  }
  
  clouds.forEach(c => c.draw(ctx));
  
  drawGround();
  
  const sortedEntities = [...mountainPeaks, ...crystals, ...corals, ...seaweeds, ...igloos, ...villages, ...trees, ...bamboos, ...palmTrees, ...bushes, ...rocks, ...cacti, ...tumbleweeds, ...snowmen, ...mushrooms, ...lilyPads, ...apples, ...sandcastles, ...seashells, ...flowers, ...animals, ...crabs, ...fish, ...butterflies, ...bees]
    .sort((a, b) => a.y - b.y);
  
  sortedEntities.forEach(e => e.draw(ctx));
}

function drawSnowfall() {
  const time = Date.now() * 0.001;
  ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
  for (let i = 0; i < 60; i++) {
    const x = (i * 47 + time * 20 + worldX * 0.1) % canvas.width;
    const y = (i * 31 + time * 40) % canvas.height;
    const size = 1 + (i % 3);
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHeatWaves() {
  const time = Date.now() * 0.002;
  ctx.strokeStyle = 'rgba(255, 200, 100, 0.15)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    const yBase = canvas.height - 100 + i * 15;
    for (let x = 0; x < canvas.width; x += 20) {
      const y = yBase + Math.sin(time + x * 0.02 + i) * 8;
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

function drawWaves() {
  const time = Date.now() * 0.001;
  ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
  for (let i = 0; i < 5; i++) {
    const y = canvas.height * 0.7 + i * 30 + Math.sin(time + i) * 10;
    ctx.beginPath();
    ctx.ellipse(canvas.width / 2, y, canvas.width, 20, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawMountainMist() {
  const time = Date.now() * 0.0005;
  ctx.fillStyle = 'rgba(200, 200, 220, 0.2)';
  for (let i = 0; i < 4; i++) {
    const y = 50 + i * 80 + Math.sin(time + i * 2) * 20;
    const x = Math.sin(time + i) * 50;
    ctx.beginPath();
    ctx.ellipse(canvas.width / 2 + x, y, canvas.width * 0.6, 40, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function updateUI() {
  const compassEl = document.getElementById('compass');
  const regionEl = document.getElementById('region');
  
  const regionNames = {
    'north': { icon: '❄️', name: 'Snowy North' },
    'north_blend': { icon: '🌨️', name: 'Northern Lands' },
    'south': { icon: '🏜️', name: 'Desert South' },
    'south_blend': { icon: '🌵', name: 'Southern Dunes' },
    'east': { icon: '🌊', name: 'Seaside East' },
    'east_blend': { icon: '🏖️', name: 'Eastern Beach' },
    'west': { icon: '🏔️', name: 'Mountain West' },
    'west_blend': { icon: '⛰️', name: 'Western Peaks' },
    'valley': { icon: '🌿', name: 'Peaceful Valley' }
  };
  
  const info = regionNames[currentRegion] || regionNames.valley;
  regionEl.textContent = info.icon + ' ' + info.name;
  
  const dist = Math.hypot(worldX, worldY);
  if (dist > 2500) {
    compassEl.innerHTML = '🧭<br><small>Far away!</small>';
  } else if (worldY < -1000) {
    compassEl.innerHTML = '⬆️<br><small>North</small>';
  } else if (worldY > 1000) {
    compassEl.innerHTML = '⬇️<br><small>South</small>';
  } else if (worldX > 1000) {
    compassEl.innerHTML = '➡️<br><small>East</small>';
  } else if (worldX < -1000) {
    compassEl.innerHTML = '⬅️<br><small>West</small>';
  } else {
    compassEl.innerHTML = '🧭<br><small>Home</small>';
  }
}

function update() {
  clouds.forEach(c => c.update());
  animals.forEach(a => a.update());
  butterflies.forEach(b => b.update());
  bees.forEach(b => b.update());
  fish.forEach(f => f.update());
  crabs.forEach(c => c.update());
  tumbleweeds.forEach(t => t.update());
  updateUI();
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function handleInteractionStart(x, y) {
  const entity = findEntityAt(x, y);
  if (entity) {
    selectedEntity = entity;
    entity.selected = true;
    touchEntity = entity;
    
    if (entity instanceof Animal) {
      entity.push(Math.random() - 0.5, Math.random() - 0.5, 1);
      entity.happiness = Math.min(100, entity.happiness + 10);
    }
  } else {
    dragging = true;
    dragStartX = x;
    dragStartY = y;
  }
}

function handleInteractionMove(x, y) {
  if (selectedEntity && touchEntity) {
    const dx = x - (selectedEntity.x - worldX);
    const dy = y - (selectedEntity.y - worldY);
    selectedEntity.x += dx;
    selectedEntity.y += dy;
  } else if (dragging) {
    const dx = dragStartX - x;
    const dy = dragStartY - y;
    worldX += dx;
    worldY += dy;
    dragStartX = x;
    dragStartY = y;
  }
}

function handleInteractionEnd() {
  if (selectedEntity) {
    selectedEntity.selected = false;
    
    if (selectedEntity instanceof Animal) {
      selectedEntity.push(Math.random() - 0.5, Math.random() - 0.5, 2);
    }
  }
  selectedEntity = null;
  touchEntity = null;
  dragging = false;
}

canvas.addEventListener('mousedown', e => {
  handleInteractionStart(e.clientX, e.clientY);
});

canvas.addEventListener('mousemove', e => {
  handleInteractionMove(e.clientX, e.clientY);
});

canvas.addEventListener('mouseup', handleInteractionEnd);
canvas.addEventListener('mouseleave', handleInteractionEnd);

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  handleInteractionStart(touch.clientX, touch.clientY);
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const touch = e.touches[0];
  handleInteractionMove(touch.clientX, touch.clientY);
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  handleInteractionEnd();
});

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

initWorld();
gameLoop();
</script>
